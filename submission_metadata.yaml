compute_environment_summary: >
  Python 3.11, CPU only, ~31s wall-clock for 100K candidates.
  orjson for fast JSON parsing. No GPU, no network at ranking time.

methodology_summary: >
  Multi-signal scoring engine with 6 weighted dimensions: role legitimacy (20%),
  technical skills (30%), career quality (20%), semantic fit (15%),
  behavioral signals (10%), location/logistics (5%). Hard red-flag multipliers
  (0.05x–0.35x) suppress non-technical roles, pure-consulting careers, and
  outside-India candidates. Honeypot detection via timeline inconsistency checks.
  No embeddings or LLM calls at inference — fast set-intersection against
  JD-derived vocabulary for semantic matching. Runs in ~31s CPU on 100K candidates.

